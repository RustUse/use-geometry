name: Facade Publish Readiness

"on":
  workflow_dispatch:
    inputs:
      registry-ready:
        description: Confirm that matching focused-crate versions are live on crates.io
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  facade-release-readiness:
    if: ${{ inputs.registry-ready }}
    name: Facade Publish Dry Run
    runs-on: ubuntu-latest
    env:
      FOCUSED_CRATES: >-
        use-coordinate use-dimension use-angle use-point use-distance use-orientation use-bounds use-line use-segment use-circle use-sphere use-hypersphere use-torus use-triangle use-containment use-congruence use-similarity use-intersection use-dihedral use-inversion use-ray use-plane use-hyperplane use-transform use-affine use-projection use-reflection use-curve use-conic use-polyline use-bezier use-spline use-rectangle use-polygon use-simplex use-orthotope use-polytope use-polyhedron use-schlafli use-regular-polytope use-uniform-polytope use-archimedean use-catalan-solid use-johnson-solid use-wythoff use-coxeter use-incidence use-projective use-configuration use-duality use-surface use-manifold use-mesh use-face use-cell use-complex use-hull use-triangulation use-tessellation use-voronoi use-delaunay use-folding use-crease use-origami use-linkage use-unfolding use-rigid-folding use-polyhedral-net
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: |
            . -> target

      - name: Confirm focused crates are visible on crates.io
        run: |
          for crate in $FOCUSED_CRATES; do
            curl --fail --silent --show-error "https://crates.io/api/v1/crates/${crate}" > /dev/null
          done

      - name: List packaged facade files
        run: cargo package --list -p use-geometry

      - name: Dry-run publish use-geometry
        run: cargo publish --dry-run --allow-dirty -p use-geometry
