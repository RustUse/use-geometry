use-catalan-solid = { version = "0.0.6", path = "crates/use-catalan-solid" }
use-cell = { version = "0.0.6", path = "crates/use-cell" }
use-circle = { version = "0.0.6", path = "crates/use-circle" }
use-complex = { version = "0.0.6", package = "use-geometric-complex", path = "crates/use-geometric-complex" }
use-congruence = { version = "0.0.6", path = "crates/use-congruence" }
use-conic = { version = "0.0.6", path = "crates/use-conic" }
