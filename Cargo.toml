	"crates/use-polytope",
	"crates/use-polyhedron",
	"crates/use-regular-polytope",
	"crates/use-uniform-polytope",
	"crates/use-archimedean",
	"crates/use-catalan-solid",
	"crates/use-johnson-solid",
	"crates/use-schlafli",
	"crates/use-wythoff",
	"crates/use-coxeter",
	"crates/use-incidence",
	"crates/use-projective",
	"crates/use-configuration",
	"crates/use-duality",
	"crates/use-mesh",
	"crates/use-face",
	"crates/use-cell",
	"crates/use-geometric-complex",
	"crates/use-hull",
	"crates/use-triangulation",
	"crates/use-tessellation",
	"crates/use-voronoi",
	"crates/use-delaunay",
	"crates/use-folding",
