use-duality = { version = "0.0.6", path = "crates/use-duality" }
use-face = { version = "0.0.6", path = "crates/use-face" }
use-folding = { version = "0.0.6", path = "crates/use-folding" }
use-hull = { version = "0.0.6", path = "crates/use-hull" }
use-hyperplane = { version = "0.0.6", path = "crates/use-hyperplane" }
use-hypersphere = { version = "0.0.6", path = "crates/use-hypersphere" }
