resolver = "2"

[workspace.package]
authors = ["RustUse Contributors"]
edition = "2024"
homepage = "https://rustuse.org"
license = "MIT OR Apache-2.0"
readme = "README.md"
repository = "https://github.com/RustUse/use-geometry"
rust-version = "1.95.0"
version = "0.0.6"

[workspace.dependencies]
proptest = { version = "1.11.0", default-features = false, features = ["std"] }
use-affine = { version = "0.0.6", path = "crates/use-affine" }
use-angle = { version = "0.0.6", path = "crates/use-angle" }
use-archimedean = { version = "0.0.6", path = "crates/use-archimedean" }
